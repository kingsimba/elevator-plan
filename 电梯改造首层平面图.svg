<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <!-- Styles -->
    <style>
      .text-title { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-label { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 16px; fill: #333; text-anchor: middle; dominant-baseline: central; }
      .text-dim { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .bg-green { fill: #a8d5a2; stroke: #666; stroke-width: 1; }
      .bg-orange { fill: #f3c77d; stroke: #666; stroke-width: 1; }
      .bg-grey { fill: #999999; stroke: #333; stroke-width: 1.5; }
      .wall-thick { fill: #f0f0f0; stroke: #333; stroke-width: 3; }
      .wall-thin { fill: #fff; stroke: #333; stroke-width: 1.5; }
      .elevator { fill: #fff; stroke: #e000e0; stroke-width: 2; }
      .elevator-inner { fill: none; stroke: #e000e0; stroke-width: 1.5; }
      .stair { fill: none; stroke: #333; stroke-width: 1; }
      .compass-circle { fill: none; stroke: #333; stroke-width: 1.5; }
      .compass-line { stroke: #333; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1000" height="800" fill="#f9f9f9" rx="8" />

  <!-- Info Box & Compass -->
  <g transform="translate(40, 30)">
    <rect width="250" height="80" fill="#fff" stroke="#333" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <circle cx="0" cy="0" r="25" class="compass-circle"/>
      <line x1="0" y1="-30" x2="0" y2="25" class="compass-line"/>
      <polygon points="0,-25 -6,0 6,0" fill="#333"/>
      <text x="0" y="-35" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">N</text>
    </g>
    <text x="85" y="32" font-family="'PingFang SC', sans-serif" font-size="14" fill="#333" dominant-baseline="central">通达园1号楼2单元</text>
    <text x="85" y="55" font-family="'PingFang SC', sans-serif" font-size="14" fill="#333" dominant-baseline="central">6层6站 平层入户</text>
  </g>

  <!-- Top Boundary -->
  <rect x="0" y="100" width="1000" height="10" fill="#000" />

  <!-- Layer: Top Green -->
  <rect x="0" y="110" width="270" height="215" class="bg-green" />
  <rect x="660" y="110" width="340" height="215" class="bg-green" />
  <text x="900" y="217" class="text-label" fill="#2c5e26">绿化</text>

  <!-- Layer: Orange Walkway & Grey Corridor -->
  <rect x="0" y="325" width="220" height="140" class="bg-orange" />
  <rect x="780" y="325" width="220" height="140" class="bg-orange" />
  <text x="890" y="395" class="text-label" fill="#8c5800">步道</text>

  <rect x="220" y="325" width="560" height="140" class="bg-grey" />
  <!-- Let's put text slightly higher so it doesn't cross the central line -->
  <text x="500" y="395" class="text-label" fill="#222" font-weight="bold">防滑石材过道</text>

  <!-- Layer: Bottom Green & Original Balconies -->
  <rect x="0" y="465" width="220" height="150" class="bg-green" />
  <rect x="780" y="465" width="220" height="150" class="bg-green" />
  <text x="890" y="540" class="text-label" fill="#2c5e26">绿化</text>

  <!-- Balconies Base Area (White) -->
  <rect x="220" y="465" width="280" height="150" class="wall-thin" fill="#ffffff" />
  <rect x="500" y="465" width="280" height="150" class="wall-thin" fill="#ffffff" />
  
  <text x="360" y="540" class="text-label" font-size="18">原阳台</text>
  <text x="640" y="540" class="text-label" font-size="18">原阳台</text>

  <!-- Main Building Top Wall -->
  <!-- We'll draw continuous lines for the visual representation -->
  <line x1="0" y1="615" x2="220" y2="615" class="wall-thick" />
  <!-- Opening at Balcony left, we can just leave it blank or close it thin -->
  <!-- Usually balconies have sliding doors leading into main house -->
  <line x1="220" y1="615" x2="480" y2="615" stroke="#333" stroke-width="1.5" stroke-dasharray="8,4" />
  <line x1="520" y1="615" x2="780" y2="615" stroke="#333" stroke-width="1.5" stroke-dasharray="8,4" />
  <line x1="780" y1="615" x2="1000" y2="615" class="wall-thick" />

  <!-- Central separation wall -->
  <line x1="500" y1="465" x2="500" y2="720" class="wall-thick" stroke-width="4" />
  <line x1="480" y1="615" x2="520" y2="615" class="wall-thick" />

  <!-- Hallway enclosure -->
  <rect x="380" y="615" width="240" height="105" class="wall-thick" fill="#ebebeb" />
  <!-- Doors from Hallway -->
  <!-- Left Door -->
  <path d="M 380,720 Q 420,720 420,760 L 380,760" fill="none" stroke="#333" stroke-width="1.5" />
  <line x1="380" y1="720" x2="420" y2="720" stroke="#333" stroke-width="1" />
  <text x="340" y="740" class="text-label" font-size="14">原入户门</text>
  <!-- Right Door -->
  <path d="M 620,720 Q 580,720 580,760 L 620,760" fill="none" stroke="#333" stroke-width="1.5" />
  <line x1="620" y1="720" x2="580" y2="720" stroke="#333" stroke-width="1" />
  <text x="660" y="740" class="text-label" font-size="14">原入户门</text>

  <!-- Big text for main building areas -->
  <text x="200" y="700" class="text-title" font-size="24">原建筑</text>
  <text x="800" y="700" class="text-title" font-size="24">原建筑</text>

  <!-- Elevator Structure -->
  <rect x="270" y="110" width="230" height="215" class="elevator" />
  <!-- Inner car -->
  <rect x="300" y="135" width="170" height="150" class="elevator-inner" />
  <!-- Crosses -->
  <line x1="300" y1="135" x2="470" y2="285" class="elevator-inner" />
  <line x1="470" y1="135" x2="300" y2="285" class="elevator-inner" />
  <!-- Door rail -->
  <rect x="280" y="295" width="210" height="15" fill="#fff" class="elevator-inner" />
  
  <!-- Elevator 4 corners crosses -->
  <path d="M 270,110 L 285,125 M 285,110 L 270,125" stroke="#e000e0" stroke-width="1.5" />
  <path d="M 485,110 L 500,125 M 500,110 L 485,125" stroke="#e000e0" stroke-width="1.5" />
  <path d="M 270,325 L 285,310 M 285,325 L 270,310" stroke="#e000e0" stroke-width="1.5" />
  <path d="M 485,325 L 500,310 M 500,325 L 485,310" stroke="#e000e0" stroke-width="1.5" />

  <!-- Stairwell Structure -->
  <rect x="500" y="110" width="160" height="215" class="wall-thin" fill="#fafafa" />
  <!-- Stair steps inside -->
  <line x1="500" y1="140" x2="610" y2="140" class="stair" />
  <line x1="500" y1="160" x2="610" y2="160" class="stair" />
  <line x1="500" y1="180" x2="610" y2="180" class="stair" />
  <line x1="500" y1="200" x2="610" y2="200" class="stair" />
  <line x1="500" y1="220" x2="610" y2="220" class="stair" />
  <!-- Handrail line -->
  <line x1="610" y1="140" x2="610" y2="220" class="stair" stroke-width="1.5" />
  <!-- Text inside stairs -->
  <text x="540" y="260" class="text-label" font-size="14">下</text>
  <text x="630" y="260" class="text-label" font-size="14">上</text>
  <text x="580" y="295" class="text-label" font-size="14">楼梯间</text>

  <!-- Dimensions -->
  <!-- Top Horizontal Dimensions -->
  <line x1="270" y1="75" x2="500" y2="75" stroke="#333" stroke-width="1.5" />
  <line x1="270" y1="65" x2="270" y2="85" stroke="#333" stroke-width="1.5" />
  <line x1="500" y1="65" x2="500" y2="85" stroke="#333" stroke-width="1.5" />
  <line x1="260" y1="85" x2="280" y2="65" stroke="#333" stroke-width="1.5" />
  <line x1="490" y1="85" x2="510" y2="65" stroke="#333" stroke-width="1.5" />
  <text x="385" y="60" class="text-dim">2300</text>

  <line x1="500" y1="75" x2="660" y2="75" stroke="#333" stroke-width="1.5" />
  <line x1="660" y1="65" x2="660" y2="85" stroke="#333" stroke-width="1.5" />
  <line x1="650" y1="85" x2="670" y2="65" stroke="#333" stroke-width="1.5" />
  <text x="580" y="60" class="text-dim">1600</text>

  <!-- Left Vertical Dimensions -->
  <!-- 2150 Elevator -->
  <line x1="250" y1="110" x2="250" y2="325" stroke="#333" stroke-width="1.5" />
  <line x1="240" y1="110" x2="260" y2="110" stroke="#333" stroke-width="1.5" />
  <line x1="240" y1="325" x2="260" y2="325" stroke="#333" stroke-width="1.5" />
  <line x1="240" y1="120" x2="260" y2="100" stroke="#333" stroke-width="1.5" />
  <line x1="240" y1="335" x2="260" y2="315" stroke="#333" stroke-width="1.5" />
  <text x="235" y="217" class="text-dim" transform="rotate(-90, 235, 217)">2150</text>

  <!-- 1400 Corridor -->
  <line x1="200" y1="325" x2="200" y2="465" stroke="#333" stroke-width="1.5" />
  <line x1="190" y1="325" x2="210" y2="325" stroke="#333" stroke-width="1.5" />
  <line x1="190" y1="465" x2="210" y2="465" stroke="#333" stroke-width="1.5" />
  <line x1="190" y1="335" x2="210" y2="315" stroke="#333" stroke-width="1.5" />
  <line x1="190" y1="475" x2="210" y2="455" stroke="#333" stroke-width="1.5" />
  <text x="185" y="395" class="text-dim" transform="rotate(-90, 185, 395)">1400</text>

  <!-- Bottom Title -->
  <text x="500" y="780" class="text-title" fill="#333" text-anchor="middle">首层平面图</text>

</svg>
